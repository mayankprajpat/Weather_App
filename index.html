<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="mainBox mainBox1">
            <h1 class="weather">Weather</h1>
            <h2 class="ForeCasts">ForeCasts</h2>
            <button class="start">Get Start</button>
    </div>

    <div class="mainBox mainBox2 inactive">
        <div class="searchBox">
            <input type="text" placeholder="Enter your city" id="inputfield" />
            <div class="img" type="button"><img src="search.svg" id="searchIcon" /></div>
        </div>

        <div class="iconBox">
            <img src="sun_15200479.png" id="icon" />
            <p id="desc"></p>
        </div>

        <div class="tempBox">
            <h1 id="temp">0°c</h1>
            <h3 id="city">.....</h3>
        </div>

        <div class="extraDetails">
            <div class="wind">
                <img src="noun-wind-4059651.svg" id="windIcon" />
                <div class="windData">
                    <p id="windSpeed">0 m/s</p>
                    <p>wind</p>
                </div>
            </div>
            <div class="humidity">
                <img src="noun-humidity-8285577.png" id="humidityIcon" />
                <div class="humidityData">
                    <p id="humidityper">0%</p>
                    <p>humidity</p>
                </div>
            </div>
        </div>
    </div>
    <div class="mainBox mainBox3 inactive">
        <h1>404</h1>
        <p>Oops! Page Not Found</p>
        <p id="info">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <button class="homeBtn">Go Home</button>
    </div>
    <div id="loadingOverlay" class="loadingOverlay hidden" role="status" aria-live="polite" aria-busy="true">
        <div class="loadingCard" aria-hidden="true">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
